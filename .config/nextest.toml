[profile.default]
# 按 CPU 核心数并行运行
test-threads = "num-cpus"
# 超时：单个测试超过 60 秒视为卡住
slow-timeout = { period = "60s", terminate-after = 3 }
# 失败后继续跑其他测试（不提前中止）
fail-fast = false

[profile.ci]
# CI 环境限制并发，避免资源争抢
test-threads = 4
slow-timeout = { period = "30s", terminate-after = 2 }
# 不提前中止，确保收集所有失败信息（而非仅第一个失败）
fail-fast = false
