name: Release Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux-amd64
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            platform: darwin-amd64
            os: macos-13
            use_cross: false
          - target: aarch64-apple-darwin
            platform: darwin-arm64
            os: macos-latest
            use_cross: false

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p rune-cli -p rune-server
          else
            cargo build --release --target ${{ matrix.target }} -p rune-cli -p rune-server
          fi

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="rune-${VERSION}-${{ matrix.platform }}.tar.gz"
          STAGING="rune-${VERSION}-${{ matrix.platform }}"

          mkdir -p "${STAGING}"
          cp "target/${{ matrix.target }}/release/rune" "${STAGING}/"
          cp "target/${{ matrix.target }}/release/rune-server" "${STAGING}/"
          tar czf "${ARCHIVE}" "${STAGING}"

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          cd release
          sha256sum *.tar.gz > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/checksums.sha256
