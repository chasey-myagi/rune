name: Feature Request
description: 提出新功能建议
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 描述
      description: 清晰简洁地描述你想要的功能
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 动机
      description: 为什么需要这个功能？解决了什么问题？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 方案建议
      description: 如果你有实现方案的想法，请在这里描述
    validations:
      required: false
