syntax = "proto3";
package rune.wire.v1;

// Caster 与 Runtime 的双向流
service RuneService {
    rpc Session(stream SessionMessage) returns (stream SessionMessage);
}

// 顶层消息：oneof 区分类型，无冗余字段
message SessionMessage {
    oneof payload {
        // Caster → Runtime
        CasterAttach attach = 10;
        CasterDetach detach = 11;
        ExecuteResult result = 12;
        StreamEvent stream_event = 13;
        StreamEnd stream_end = 14;

        // Runtime → Caster
        AttachAck attach_ack = 20;
        ExecuteRequest execute = 21;
        CancelRequest cancel = 22;

        // 双向
        Heartbeat heartbeat = 30;
    }
}

// ── Caster 注册 ──

message CasterAttach {
    string caster_id = 1;
    repeated RuneDeclaration runes = 2;
    map<string, string> labels = 3;
    uint32 max_concurrent = 4;
}

message AttachAck {
    bool accepted = 1;
    string reason = 2;
}

message CasterDetach {
    string reason = 1;
}

// ── Rune 声明 ──

message RuneDeclaration {
    string name = 1;
    string version = 2;
    string description = 3;
    reserved 4, 5;  // input_schema, output_schema — removed in v0.1.0, reserved for future contract support
    bool supports_stream = 6;
    GateConfig gate = 7;
}

message GateConfig {
    string path = 1;
    string method = 2;
}

// ── 执行 ──

message ExecuteRequest {
    string request_id = 1;
    string rune_name = 2;
    bytes input = 3;
    map<string, string> context = 4;
    uint32 timeout_ms = 5;
}

message CancelRequest {
    string request_id = 1;
    string reason = 2;
}

message ExecuteResult {
    string request_id = 1;
    Status status = 2;
    bytes output = 3;
    ErrorDetail error = 4;
}

// ── 流式 ──

message StreamEvent {
    string request_id = 1;
    bytes data = 2;
    string event_type = 3;
}

message StreamEnd {
    string request_id = 1;
    Status status = 2;
    ErrorDetail error = 3;
}

// ── 心跳 ──

message Heartbeat {
    uint64 timestamp_ms = 1;
}

// ── 公共类型 ──

enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_COMPLETED = 1;
    STATUS_FAILED = 2;
    STATUS_CANCELLED = 3;
}

message ErrorDetail {
    string code = 1;
    string message = 2;
    bytes details = 3;
}
